<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'self' https://fonts.googleapis.com https://fonts.gstatic.com; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self'; connect-src 'none';">
<title>404 — Iron Atlas</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;500;600&family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&display=swap" rel="stylesheet">
<style>
:root{--void:#050508;--red:#c0392b;--red-glow:#ff4455;--cream:#f0e6d3;--parchment:#c8b89a;--ash:#7a6e6e;--line:rgba(192,57,43,0.2);}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--void);color:var(--parchment);font-family:'EB Garamond',Georgia,serif;height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:2rem;overflow:hidden;cursor:none;}
.cursor-dot{position:fixed;width:6px;height:6px;background:var(--red-glow);border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);box-shadow:0 0 10px var(--red-glow),0 0 20px rgba(255,68,85,0.4);}
.cursor-ring{position:fixed;width:32px;height:32px;border:1px solid rgba(192,57,43,0.5);border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:all 0.18s cubic-bezier(.25,.46,.45,.94);}
.ambient{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:700px;height:500px;background:radial-gradient(ellipse,rgba(192,57,43,0.05),transparent 70%);pointer-events:none;animation:pulse-amb 5s ease-in-out infinite;}
@keyframes pulse-amb{0%,100%{opacity:0.5}50%{opacity:1}}
.bg-num{position:fixed;font-family:'Cinzel Decorative',serif;font-size:28vw;font-weight:900;color:rgba(192,57,43,0.03);pointer-events:none;user-select:none;animation:float 10s ease-in-out infinite;}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-16px)}}
.logo-wrap{margin-bottom:2.5rem;position:relative;}
.logo-wrap img{height:70px;width:70px;object-fit:contain;filter:drop-shadow(0 0 24px rgba(192,57,43,0.6));animation:logo-breathe 4s ease-in-out infinite;}
@keyframes logo-breathe{0%,100%{filter:drop-shadow(0 0 20px rgba(192,57,43,0.5))}50%{filter:drop-shadow(0 0 36px rgba(192,57,43,0.9))}}
.eyebrow{display:inline-flex;align-items:center;gap:0.9rem;font-family:'Cinzel',serif;font-size:0.55rem;letter-spacing:0.3em;color:var(--red);opacity:0.7;margin-bottom:2rem;}
.eyebrow::before,.eyebrow::after{content:'';width:24px;height:1px;background:var(--red);}
.title{font-family:'Cinzel Decorative',serif;font-size:clamp(1.5rem,5vw,3.5rem);font-weight:900;color:var(--cream);text-shadow:0 0 30px rgba(192,57,43,0.3);margin-bottom:0.8rem;line-height:1.2;}
.subtitle{font-family:'EB Garamond',serif;font-style:italic;font-size:1.1rem;color:var(--ash);line-height:1.9;max-width:420px;margin:0 auto 3rem;}
.back{display:inline-flex;align-items:center;gap:0.6rem;font-family:'Cinzel',serif;font-size:0.58rem;letter-spacing:0.22em;color:var(--red);text-decoration:none;border:1px solid rgba(192,57,43,0.35);padding:13px 36px;transition:all 0.3s;clip-path:polygon(0 0,calc(100% - 8px) 0,100% 8px,100% 100%,8px 100%,0 calc(100% - 8px));}
.back:hover{border-color:var(--red);background:rgba(192,57,43,0.06);box-shadow:0 0 20px rgba(192,57,43,0.1);}
.back::before{content:'←';}
</style>
</head>
<body>
<div class="cursor-dot" id="cd"></div>
<div class="cursor-ring" id="cr"></div>
<div class="ambient"></div>
<div class="bg-num">404</div>
<div class="logo-wrap">
  <img src="/assets/iron.png" alt="Iron Atlas">
</div>
<p class="eyebrow">Error de Navegación</p>
<h1 class="title">Esta página<br>no existe</h1>
<p class="subtitle">Lo que buscas no está aquí, o nunca lo estuvo.<br>Algunos archivos se ocultan incluso de nosotros.</p>
<a href="/" class="back">Volver al inicio</a>
<script>
(function(){
  var cd=document.getElementById('cd'),cr=document.getElementById('cr');
  var mx=0,my=0,rx=0,ry=0;
  document.addEventListener('mousemove',function(e){mx=e.clientX;my=e.clientY;cd.style.left=mx+'px';cd.style.top=my+'px';});
  (function loop(){rx+=(mx-rx)*.12;ry+=(my-ry)*.12;cr.style.left=rx+'px';cr.style.top=ry+'px';requestAnimationFrame(loop);})();
  document.querySelectorAll('a').forEach(function(el){
    el.addEventListener('mouseenter',function(){cr.style.width='50px';cr.style.height='50px';cr.style.borderColor='rgba(192,57,43,0.7)';});
    el.addEventListener('mouseleave',function(){cr.style.width='32px';cr.style.height='32px';cr.style.borderColor='rgba(192,57,43,0.5)';});
  });
})();
</script>
</body>
</html>
