<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IRON ATLAS — NEW GENERATION</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #030000;
            --neon-red: #ff003c;
            --neon-dark-red: #990024;
            --text-light: #ffd6e0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            user-select: none;
            -webkit-user-drag: none;
        }

        body {
            background-color: var(--bg-dark);
            color: #ffffff;
            overflow-x: hidden;
            min-height: 100vh;
        }

        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
            pointer-events: none;
        }

        .top-nav {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem 3rem;
            background: rgba(3, 0, 0, 0.7);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255, 0, 60, 0.3);
            box-shadow: 0 4px 30px rgba(255, 0, 60, 0.1);
            z-index: 100;
        }

        .nav-brand {
            display: flex;
            align-items: center;
            gap: 1rem;
            text-decoration: none;
        }

        .nav-logo {
            height: 40px;
            filter: drop-shadow(0 0 8px var(--neon-red));
        }

        .nav-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            font-weight: 900;
            color: #fff;
            letter-spacing: 2px;
            text-shadow: 0 0 10px var(--neon-red);
        }

        .nav-links {
            display: flex;
            gap: 2.5rem;
        }

        .nav-link {
            font-family: 'Orbitron', sans-serif;
            color: var(--text-light);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            position: relative;
            transition: color 0.3s;
        }

        .nav-link::after {
            content: '';
            position: absolute;
            width: 0;
            height: 2px;
            bottom: -5px;
            left: 0;
            background-color: var(--neon-red);
            transition: width 0.3s ease;
            box-shadow: 0 0 8px var(--neon-red);
        }

        .nav-link:hover {
            color: #ffffff;
            text-shadow: 0 0 15px var(--neon-red);
        }

        .nav-link:hover::after {
            width: 100%;
        }

        .hamburger {
            display: none;
            flex-direction: column;
            gap: 5px;
            cursor: pointer;
        }

        .hamburger span {
            width: 25px;
            height: 3px;
            background: var(--neon-red);
            border-radius: 2px;
            box-shadow: 0 0 5px var(--neon-red);
        }

        .main-content {
            position: relative;
            z-index: 2;
            width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 8rem 2rem 2rem 2rem;
        }

        .hero-section {
            text-align: center;
            margin-bottom: 4rem;
            animation: fadeIn 2s ease-out;
        }

        .hero-section h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(2.5rem, 6vw, 5.5rem);
            font-weight: 900;
            letter-spacing: 5px;
            text-transform: uppercase;
            color: #ffffff;
            text-shadow: 0 0 20px rgba(255, 0, 60, 0.5), 0 0 40px rgba(255, 0, 60, 0.3), 0 0 80px var(--neon-red);
            margin-bottom: 1.5rem;
        }

        .hero-quote {
            font-size: clamp(1.1rem, 2vw, 1.5rem);
            color: var(--text-light);
            max-width: 800px;
            margin: 0 auto;
            line-height: 1.6;
            font-style: italic;
            letter-spacing: 1px;
            text-shadow: 0 0 10px rgba(255, 0, 60, 0.4);
            border-left: 3px solid var(--neon-red);
            border-right: 3px solid var(--neon-red);
            padding: 0 1.5rem;
        }

        .allies-container {
            width: 100%;
            max-width: 1200px;
            margin-top: 3rem;
        }

        .section-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.8rem;
            letter-spacing: 4px;
            margin-bottom: 2.5rem;
            text-transform: uppercase;
            text-align: center;
            color: #ffffff;
            text-shadow: 0 0 15px var(--neon-red);
        }

        .allies-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
        }

        .ally-card {
            background: rgba(15, 0, 5, 0.6);
            border: 1px solid rgba(255, 0, 60, 0.2);
            border-radius: 8px;
            padding: 1.5rem;
            display: flex;
            align-items: center;
            gap: 1.5rem;
            text-decoration: none;
            color: #ffffff;
            backdrop-filter: blur(10px);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
        }

        .ally-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 0, 60, 0.1), transparent);
            transition: 0.5s;
        }

        .ally-card:hover::before {
            left: 100%;
        }

        .ally-card:hover {
            border-color: var(--neon-red);
            box-shadow: 0 10px 30px rgba(255, 0, 60, 0.2), inset 0 0 15px rgba(255, 0, 60, 0.1);
            transform: translateY(-5px);
        }

        .ally-img {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid rgba(255, 0, 60, 0.3);
            transition: border-color 0.4s, box-shadow 0.4s;
        }

        .ally-card:hover .ally-img {
            border-color: var(--neon-red);
            box-shadow: 0 0 15px var(--neon-red);
        }

        .ally-name {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: 1px;
            transition: color 0.3s, text-shadow 0.3s;
        }

        .ally-card:hover .ally-name {
            color: #ffffff;
            text-shadow: 0 0 10px var(--neon-red);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 900px) {
            .nav-links {
                display: none;
                position: absolute;
                top: 100%;
                left: 0;
                width: 100%;
                flex-direction: column;
                background: rgba(3, 0, 0, 0.95);
                padding: 2rem 0;
                text-align: center;
                border-bottom: 1px solid var(--neon-red);
            }
            .nav-links.active {
                display: flex;
            }
            .hamburger {
                display: flex;
            }
            .hero-quote {
                border: none;
                padding: 0;
            }
        }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <nav class="top-nav">

            <img src="/assets/iron.png" alt="IRON ATLAS" class="nav-logo" onerror="this.src='data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxMDAgMTAwIj48Y2lyY2xlIGN4PSI1MCIgY3k9IjUwIiByPSI0MCIgZmlsbD0ibm9uZSIgc3Ryb2tlPSIjZmYwMDNjIiBzdHJva2Utd2lkdGg9IjUiLz48L3N2Zz4='">
            <span class="nav-title">IRON ATLAS</span>
        </a>
        <div class="hamburger" id="mobile-menu">
            <span></span>
            <span></span>
            <span></span>
        </div>
        <div class="nav-links" id="nav-links">
            <a href="/tools/index.html" class="nav-link">Herramientas</a>

    <main class="main-content">
        <section class="hero-section">
            <h1>New Generation</h1>
            <p class="hero-quote">"No somos una organización. Somos la anomalía que el sistema no puede parchear."</p>
        </section>

        <section class="allies-container">
            <h2 class="section-title">Red de Alianzas</h2>
            <div class="allies-grid">
                <a href="https://t.me/nullsechackers" class="ally-card" target="_blank">

                    <img src="https://i.postimg.cc/3yq9xnnX/teamjxll.jpg" class="ally-img">
                    <span class="ally-name">𝐓𝐄𝐀𝐌 𝐉𝐗𝐋𝐋</span>

    <script>
        const mobileMenuBtn = document.getElementById('mobile-menu');
        const navLinks = document.getElementById('nav-links');

        mobileMenuBtn.addEventListener('click', () => {
            navLinks.classList.toggle('active');
        });

        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        class Node {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.vx = (Math.random() - 0.5) * 1.5;
                this.vy = (Math.random() - 0.5) * 1.5;
                this.radius = Math.random() * 2 + 1;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;

                if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
                if (this.y < 0 || this.y > canvas.height) this.vy *= -1;
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = '#ff003c';
                ctx.fill();
            }
        }

        function initNodes() {
            particles = [];
            let count = Math.floor((canvas.width * canvas.height) / 12000);
            for (let i = 0; i < count; i++) {
                particles.push(new Node());
            }
        }

        function animateNodes() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();
                
                for (let j = i; j < particles.length; j++) {
                    let dx = particles[i].x - particles[j].x;
                    let dy = particles[i].y - particles[j].y;
                    let distance = Math.sqrt(dx * dx + dy * dy);
                    
                    if (distance < 120) {
                        ctx.beginPath();
                        ctx.strokeStyle = `rgba(255, 0, 60, ${1 - distance/120})`;
                        ctx.lineWidth = 0.5;
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.stroke();
                    }
                }
            }
            requestAnimationFrame(animateNodes);
        }

        initNodes();
        animateNodes();

        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('keydown', e => {
            if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'J' || e.key === 'C')) || (e.ctrlKey && e.key === 'U')) {
                e.preventDefault();
            }
        });
        setInterval(() => {
            (function() { return false; }['constructor']('debugger')());
        }, 50);
    </script>
