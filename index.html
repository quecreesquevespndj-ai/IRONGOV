<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IRON ATLAS NEW GENERATION</title>
    <style>
        /* === ESTILOS BASE Y VARIABLES === */
        :root {
            --bg-color: #050505;
            --text-main: #e0e0e0;
            --accent: #00e5ff;
            --accent-glow: rgba(0, 229, 255, 0.4);
            --nav-bg: rgba(5, 5, 5, 0.7);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Courier New', Courier, monospace; /* Fuente estilo consola/hacker */
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            overflow-x: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* === FONDO ANIMADO DE NODOS === */
        #network-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            opacity: 0.6;
        }

        /* === BARRA DE MENÚ (Efecto Cristal) === */
        nav {
            position: fixed;
            width: 100%;
            top: 0;
            display: flex;
            justify-content: center;
            padding: 20px 0;
            background: var(--nav-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(0, 229, 255, 0.1);
            z-index: 100;
        }

        .nav-links {
            display: flex;
            gap: 40px;
            list-style: none;
        }

        .nav-links li a {
            color: var(--text-main);
            text-decoration: none;
            font-size: 1.1rem;
            letter-spacing: 2px;
            transition: all 0.3s ease;
            text-transform: uppercase;
            position: relative;
        }

        .nav-links li a::after {
            content: '';
            position: absolute;
            width: 0;
            height: 2px;
            bottom: -5px;
            left: 0;
            background-color: var(--accent);
            box-shadow: 0 0 10px var(--accent);
            transition: width 0.3s ease;
        }

        .nav-links li a:hover {
            color: var(--accent);
            text-shadow: 0 0 8px var(--accent-glow);
        }

        .nav-links li a:hover::after {
            width: 100%;
        }

        /* === SECCIÓN PRINCIPAL (HERO) === */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 20px;
            margin-top: 80px;
        }

        .title-container {
            position: relative;
        }

        h1 {
            font-size: 4vw;
            letter-spacing: 10px;
            color: transparent;
            -webkit-text-stroke: 1px var(--accent);
            text-shadow: 0 0 20px var(--accent-glow);
            animation: pulse 4s infinite alternate;
            margin-bottom: 20px;
        }

        /* Efecto de escritura para la frase */
        .typewriter-container {
            display: inline-block;
        }

        .typewriter-text {
            font-size: 1.5vw;
            color: #a0a0a0;
            letter-spacing: 3px;
            border-right: 2px solid var(--accent);
            white-space: nowrap;
            overflow: hidden;
            animation: blinkCursor 0.75s step-end infinite;
        }

        /* === ANIMACIONES === */
        @keyframes pulse {
            0% { text-shadow: 0 0 10px var(--accent-glow); -webkit-text-stroke: 1px rgba(0, 229, 255, 0.5); }
            100% { text-shadow: 0 0 30px var(--accent), 0 0 50px var(--accent); -webkit-text-stroke: 1px var(--accent); }
        }

        @keyframes blinkCursor {
            from, to { border-color: transparent }
            50% { border-color: var(--accent); }
        }

        /* Responsive para móviles */
        @media (max-width: 768px) {
            .nav-links { gap: 15px; flex-wrap: wrap; justify-content: center; }
            h1 { font-size: 8vw; }
            .typewriter-text { font-size: 4vw; }
        }
    </style>
</head>
<body>

    <!-- Fondo interactivo -->
    <canvas id="network-canvas"></canvas>

    <!-- Menú de navegación -->
    <nav>
        <ul class="nav-links">
            <li><a href="#inicio">Inicio</a></li>
            <li><a href="#herramientas">Herramientas</a></li>
            <li><a href="#expedientes">Expedientes</a></li>
            <li><a href="#canales">Canales</a></li>
        </ul>
    </nav>

    <!-- Contenido principal -->
    <main id="inicio">
        <div class="title-container">
            <h1>IRON ATLAS<br>NEW GENERATION</h1>
        </div>
        <div class="typewriter-container">
            <p class="typewriter-text" id="slogan"></p>
        </div>
    </main>

    <!-- === SCRIPTS === -->
    <script>
        // 1. EFECTO DE MÁQUINA DE ESCRIBIR (HACKER)
        const phrase = "LA VERDAD NO PUEDE SER ENCRIPTADA. NOSOTROS SOMOS LA LLAVE.";
        const sloganElement = document.getElementById("slogan");
        let i = 0;

        function typeWriter() {
            if (i < phrase.length) {
                sloganElement.innerHTML += phrase.charAt(i);
                i++;
                setTimeout(typeWriter, 100); // Velocidad de escritura
            }
        }
        
        // Iniciar escritura después de 1 segundo
        setTimeout(typeWriter, 1000);

        // 2. EFECTO DE RED DE NODOS EN EL FONDO (CANVAS ANIMATION)
        const canvas = document.getElementById("network-canvas");
        const ctx = canvas.getContext("2d");
        
        let particlesArray;

        // Ajustar tamaño del canvas al tamaño de la ventana
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            init();
        });

        // Crear objeto Partícula (Nodo)
        class Particle {
            constructor(x, y, directionX, directionY, size, color) {
                this.x = x;
                this.y = y;
                this.directionX = directionX;
                this.directionY = directionY;
                this.size = size;
                this.color = color;
            }
            // Dibujar punto
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2, false);
                ctx.fillStyle = this.color;
                ctx.fill();
            }
            // Mover punto y comprobar bordes
            update() {
                if (this.x > canvas.width || this.x < 0) {
                    this.directionX = -this.directionX;
                }
                if (this.y > canvas.height || this.y < 0) {
                    this.directionY = -this.directionY;
                }
                this.x += this.directionX;
                this.y += this.directionY;
                this.draw();
            }
        }

        // Conectar los puntos con líneas si están cerca
        function connect() {
            let opacityValue = 1;
            for (let a = 0; a < particlesArray.length; a++) {
                for (let b = a; b < particlesArray.length; b++) {
                    let distance = ((particlesArray[a].x - particlesArray[b].x) * (particlesArray[a].x - particlesArray[b].x))
                    + ((particlesArray[a].y - particlesArray[b].y) * (particlesArray[a].y - particlesArray[b].y));
                    
                    if (distance < (canvas.width / 7) * (canvas.height / 7)) {
                        opacityValue = 1 - (distance / 20000);
                        ctx.strokeStyle = `rgba(0, 229, 255, ${opacityValue * 0.2})`;
                        ctx.lineWidth = 1;
                        ctx.beginPath();
                        ctx.moveTo(particlesArray[a].x, particlesArray[a].y);
                        ctx.lineTo(particlesArray[b].x, particlesArray[b].y);
                        ctx.stroke();
                    }
                }
            }
        }

        // Inicializar la red
        function init() {
            particlesArray = [];
            let numberOfParticles = (canvas.height * canvas.width) / 15000;
            // Límite de partículas para no sobrecargar el navegador
            if(numberOfParticles > 100) numberOfParticles = 100; 
            
            for (let i = 0; i < numberOfParticles; i++) {
                let size = (Math.random() * 2) + 1;
                let x = (Math.random() * ((innerWidth - size * 2) - (size * 2)) + size * 2);
                let y = (Math.random() * ((innerHeight - size * 2) - (size * 2)) + size * 2);
                let directionX = (Math.random() * 1) - 0.5;
                let directionY = (Math.random() * 1) - 0.5;
                let color = '#00e5ff';

                particlesArray.push(new Particle(x, y, directionX, directionY, size, color));
            }
        }

        // Bucle de animación
        function animate() {
            requestAnimationFrame(animate);
            ctx.clearRect(0, 0, innerWidth, innerHeight);

            for (let i = 0; i < particlesArray.length; i++) {
                particlesArray[i].update();
            }
            connect();
        }

        init();
        animate();
    </script>
</body>
</html>
