<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IRON ATLAS — NEW GENERATION</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #050508;
            --neon-cyan: #00f0ff;
            --neon-red: #ff0055;
            --neon-purple: #bd00ff;
            --text-gray: #8a8f98;
            --card-bg: rgba(10, 10, 15, 0.7);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            user-select: none; /* Bloquea selección de texto */
            -webkit-user-drag: none;
        }

        body {
            background-color: var(--bg-dark);
            color: #ffffff;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* Canvas del Fondo de Partículas Interactivo Estilo Cloudflare */
        #particle-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
            pointer-events: none;
        }

        /* Contenedor Principal */
        .app-container {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }

        /* HERO SECTION */
        .hero {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 4rem 0;
            min-height: 70vh;
        }

        .logo-container {
            position: relative;
            margin-bottom: 2rem;
            animation: floating 4s ease-in-out infinite;
        }

        .main-logo {
            width: 190px;
            height: auto;
            filter: drop-shadow(0 0 15px rgba(0, 240, 255, 0.6));
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .main-logo:hover {
            transform: scale(1.08) rotate(3deg);
        }

        .hero h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 3rem;
            font-weight: 900;
            letter-spacing: 4px;
            text-transform: uppercase;
            background: linear-gradient(45deg, #ffffff, var(--neon-cyan), var(--neon-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1rem;
            text-shadow: 0 0 30px rgba(0, 240, 255, 0.2);
        }

        .hero p {
            color: var(--text-gray);
            font-size: 1.1rem;
            max-width: 600px;
            line-height: 1.6;
            letter-spacing: 1px;
        }

        /* DIRECTORIOS / MENÚ DE ENLACES PRINCIPALES */
        .directory-nav {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 1.5rem;
            width: 100%;
            margin: 3rem 0;
        }

        .nav-btn {
            background: var(--card-bg);
            border: 1px solid rgba(0, 240, 255, 0.15);
            padding: 1.5rem;
            border-radius: 12px;
            text-align: center;
            text-decoration: none;
            color: #ffffff;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-size: 0.95rem;
            backdrop-filter: blur(10px);
            transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
            position: relative;
            overflow: hidden;
        }

        .nav-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 240, 255, 0.2), transparent);
            transition: 0.5s;
        }

        .nav-btn:hover::before {
            left: 100%;
        }

        .nav-btn:hover {
            border-color: var(--neon-cyan);
            box-shadow: 0 0 25px rgba(0, 240, 255, 0.35);
            transform: translateY(-5px);
            color: var(--neon-cyan);
        }

        /* SECCIÓN DE INTEGRANTES / ALIADOS (GRID MEJORADO) */
        .section-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.6rem;
            letter-spacing: 3px;
            margin: 4rem 0 2rem 0;
            text-transform: uppercase;
            border-left: 4px solid var(--neon-red);
            padding-left: 1rem;
            text-shadow: 0 0 15px rgba(255, 0, 85, 0.3);
        }

        .allies-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2rem;
            margin-bottom: 5rem;
        }

        .ally-card {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 1.2rem;
            display: flex;
            align-items: center;
            gap: 1.2rem;
            text-decoration: none;
            color: #ffffff;
            backdrop-filter: blur(12px);
            transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
            border-inline-start: 4px solid transparent;
        }

        .ally-card:hover {
            border-color: rgba(255, 0, 85, 0.3);
            border-inline-start-color: var(--neon-red);
            box-shadow: 0 15px 35px rgba(255, 0, 85, 0.15);
            transform: scale(1.03) translateY(-2px);
        }

        .ally-img {
            width: 65px;
            height: 65px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid rgba(255, 255, 255, 0.1);
            transition: border-color 0.4s;
        }

        .ally-card:hover .ally-img {
            border-color: var(--neon-red);
        }

        .ally-name {
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            transition: color 0.3s;
        }

        .ally-card:hover .ally-name {
            color: var(--neon-red);
        }

        @keyframes floating {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .hero h1 { font-size: 2rem; letter-spacing: 2px; }
            .app-container { padding: 1rem; }
            .directory-nav { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <canvas id="particle-canvas"></canvas>

    <div class="app-container">
        <section class="hero">
            <div class="logo-container">
                <img src="/assets/iron.png" alt="IRON ATLAS LOGO" class="main-logo">
            </div>
            <h1>Iron Atlas</h1>
            <p>HACTIVISTAS DE CORASON .</p>
        </section>

        <h2 class="section-title" style="border-left-color: var(--neon-cyan);">Módulos del Sistema</h2>
        <nav class="directory-nav">
            <a href="/tools/index.html" class="nav-btn">Herramientas</a>
            <a href="/expuestos/expedientes.html" class="nav-btn">Expedientes</a>
            <a href="/canales.html" class="nav-btn">Canales Griegos</a>
            <a href="/404.html" class="nav-btn">Zona de Pruebas</a>
        </nav>

        <h2 class="section-title">Aliados Estratégicos</h2>
        <div class="allies-grid">
            <a href="https://t.me/nullsechackers" class="ally-card" target="_blank">
                <img src="https://i.postimg.cc/mPCTw51J/nullsec.jpg" class="ally-img">
                <span class="ally-name">Nullsec Philippines</span>
            </a>
            <a href="https://t.me/HackPurgatory" class="ally-card" target="_blank">
                <img src="https://files.catbox.moe/iwurbn.jpg" class="ally-img">
                <span class="ally-name">𝐇𝐀𝐂𝐊 [𝐏𝐔𝐑𝐆𝐀𝐓𝐎𝐑𝐘]™</span>
            </a>
            <a href="https://t.me/zconchita" class="ally-card" target="_blank">
                <img src="https://i.postimg.cc/3yq9xnnX/teamjxll.jpg" class="ally-img">
                <span class="ally-name">𝐓𝐄𝐀𝐌 𝐉𝐗𝐋𝐋</span>
            </a>
        </div>
    </div>

    <script>
        // 1. EFECTO PARTÍCULAS INTERACTIVO ESTILO CLOUDFLARE OATHNET
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        let particlesArray = [];
        const mouse = { x: null, y: null, radius: 160 };

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        window.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });

        window.addEventListener('mouseout', () => {
            mouse.x = null;
            mouse.y = null;
        });

        class Particle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.size = Math.random() * 2 + 1;
                this.baseX = this.x;
                this.baseY = this.y;
                this.density = (Math.random() * 30) + 15;
                this.color = Math.random() > 0.5 ? '#00f0ff' : '#bd00ff';
            }
            draw() {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.closePath();
                ctx.fill();
            }
            update() {
                if (mouse.x !== null) {
                    let dx = mouse.x - this.x;
                    let dy = mouse.y - this.y;
                    let distance = Math.hypot(dx, dy);
                    let forceDirectionX = dx / distance;
                    let forceDirectionY = dy / distance;
                    let maxDistance = mouse.radius;
                    let force = (maxDistance - distance) / maxDistance;
                    if (distance < mouse.radius) {
                        this.x -= forceDirectionX * force * this.density;
                        this.y -= forceDirectionY * force * this.density;
                    } else {
                        if (this.x !== this.baseX) { this.x -= (this.x - this.baseX) * 0.1; }
                        if (this.y !== this.baseY) { this.y -= (this.y - this.baseY) * 0.1; }
                    }
                } else {
                    if (this.x !== this.baseX) { this.x -= (this.x - this.baseX) * 0.1; }
                    if (this.y !== this.baseY) { this.y -= (this.y - this.baseY) * 0.1; }
                }
            }
        }

        function initParticles() {
            particlesArray = [];
            let numberOfParticles = (canvas.width * canvas.height) / 4500;
            for (let i = 0; i < numberOfParticles; i++) {
                let x = Math.random() * canvas.width;
                let y = Math.random() * canvas.height;
                particlesArray.push(new Particle(x, y));
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particlesArray.length; i++) {
                particlesArray[i].draw();
                particlesArray[i].update();
            }
            requestAnimationFrame(animate);
        }
        initParticles();
        animate();

     
        document.addEventListener('contextmenu', e => e.preventDefault());
        
        document.addEventListener('keydown', e => {
            if (
                e.key === 'F12' ||
                (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'J' || e.key === 'C')) ||
                (e.ctrlKey && e.key === 'U')
            ) {
                e.preventDefault();
                return false;
            }
        });

      
        setInterval(() => {
            (function() {
                return false;
            }['constructor']('debugger')());
        }, 50);
    </script>
</body>
</html>
