            text-decoration: none;
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            position: relative;
            transition: all 0.3s;

        .nav-link::after {
            content: '';
            position: absolute;
            width: 0;
            height: 2px;
            bottom: -5px;
            left: 0;
            background-color: var(--neon-red);
            transition: width 0.3s ease;
            box-shadow: 0 0 8px var(--neon-red);
        }
        .nav-link:hover {
            color: #ffffff;
            text-shadow: 0 0 20px var(--neon-red);
        }
        .nav-link:hover::after {
            width: 100%;
        }
        .hamburger {
            display: none;
            flex-direction: column;
            gap: 6px;
            cursor: pointer;
        }
        .hamburger span {
            width: 30px;
            height: 3px;
            background: var(--neon-red);
            border-radius: 2px;
            box-shadow: 0 0 5px var(--neon-red);
        }
        .main-content {
            position: relative;
            z-index: 2;
            width: 100%;
            min-height: 100vh;
            padding: 10rem 2rem 6rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .header {
            text-align: center;
            margin-bottom: 4rem;
        }
        .header h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(3.2rem, 9vw, 7rem);
            font-weight: 900;

            text-shadow: 0 0 40px var(--neon-red), 0 0 80px var(--neon-red), 0 0 120px var(--neon-red);
            animation: titleGlow 2s ease-in-out infinite alternate;
        }
        .search-container {
            width: 100%;
            max-width: 680px;
            margin-bottom: 4.5rem;
            position: relative;
        }
        #searchInput {
            width: 100%;
            padding: 1.4rem 1.8rem 1.4rem 4.5rem;
            background: rgba(8, 0, 4, 0.85);
            border: 2px solid var(--neon-red);
            border-radius: 50px;
            color: white;
            font-size: 1.25rem;
            outline: none;
            box-shadow: 0 0 35px rgba(255, 0, 60, 0.5);
            transition: all 0.4s ease;

            border-color: var(--neon-cyan);
            box-shadow: 0 0 45px rgba(0, 240, 255, 0.8);
        }

            position: absolute;
            left: 1.8rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--neon-red);
            font-size: 1.7rem;
        }
        .expedientes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(310px, 1fr));
            gap: 2.5rem;
            width: 100%;
            max-width: 1500px;
        }
        .expediente-card {
            background: rgba(10, 0, 5, 0.9);
            border: 1px solid rgba(255, 0, 60, 0.4);
            border-radius: 20px;
            overflow: hidden;
            position: relative;
            transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
        }
        .expediente-card:hover {
            transform: translateY(-20px) scale(1.08);
            border-color: var(--neon-cyan);
            box-shadow: 0 40px 80px rgba(255, 0, 60, 0.5), 0 0 60px rgba(0, 240, 255, 0.3);
        }
        .card-image-container {
            position: relative;
            overflow: hidden;
        }
        .card-image {
            width: 100%;
            height: 290px;
            object-fit: cover;
            transition: all 0.8s ease;
        }
        .expediente-card:hover .card-image {
            transform: scale(1.15);
            filter: brightness(1.25) contrast(1.2) saturate(1.3);
        }
        .glitch-overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(transparent, rgba(255,0,60,0.15), transparent);
            opacity: 0;
            transition: opacity 0.4s;
            pointer-events: none;
        }
        .expediente-card:hover .glitch-overlay {
            opacity: 1;
            animation: glitch 0.6s linear infinite;
        }
        .card-body {
            padding: 1.9rem 1.5rem;
            text-align: center;
        }
        .card-id {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.45rem;
            color: var(--neon-cyan);
            text-shadow: 0 0 15px var(--neon-cyan);
            margin-bottom: 0.7rem;
            letter-spacing: 3px;
        }
        .card-name {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.55rem;
            font-weight: 700;
            color: #fff;
            margin-bottom: 0.6rem;
        }
        .card-username {
            color: var(--text-light);
            font-size: 1.2rem;
            margin-bottom: 1.5rem;
        }
        .btn-ver {
            padding: 1rem 2.8rem;
            background: transparent;
            color: #fff;
            border: 2px solid var(--neon-red);
            border-radius: 50px;
            font-weight: 700;
            font-size: 1.1rem;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.4s ease;
            text-transform: uppercase;
        }
        .btn-ver:hover {
            background: var(--neon-red);
            box-shadow: 0 0 35px var(--neon-red);
            transform: scale(1.1);
        }
        @keyframes titleGlow {
            from { text-shadow: 0 0 30px var(--neon-red), 0 0 70px var(--neon-red); }
            to { text-shadow: 0 0 50px var(--neon-red), 0 0 100px var(--neon-red), 0 0 140px var(--neon-red); }
        }
        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-4px, 4px); }
            40% { transform: translate(-4px, -4px); }
            60% { transform: translate(4px, 4px); }
            80% { transform: translate(4px, -4px); }
            100% { transform: translate(0); }
        }
        @media (max-width: 1024px) {
            .nav-links {
                display: none;
                position: absolute;
                top: 100%;
                left: 0;
                width: 100%;
                flex-direction: column;
                background: rgba(3, 0, 0, 0.98);
                padding: 2rem 0;
                text-align: center;
                border-bottom: 1px solid var(--neon-red);
            }
            .nav-links.active { display: flex; }
            .hamburger { display: flex; }
        }
    </style>
</head>

        <div class="expedientes-grid" id="expedientesGrid"></div>

    <script>
        const expedientes = [
            { 
                id: "8178082276", 
                nombre: "Gatsby171",

                foto: "https://postimg.cc/N5474LVd",

            {

                username: "@yei777moneyyy", 
                foto: "https://i.postimg.cc/FzbtfDFs/photo-2025-11-25-07-01-55.jpg",
                archivo: "yei777.html"
            },
            { 
                id: "8353760780", 
                nombre: "メ RELEASE CORLEONE メ", 
                username: "@ReleaseG0D", 
                foto: "https://i.postimg.cc/pXYwBGf9/release.jpg",
                archivo: "release.html"
            },
            { 
                id: "1609732536", 
                nombre: "Yuranys🐛", 
                username: "@Yuranyss", 
                foto: "https://i.postimg.cc/nrKP0rQS/yuranisssssssssssss.jpg",
                archivo: "yuranis.html"
            },
            { 
                id: "8491972019", 
                nombre: "𝐳𝐩𝐞𝐪𝐧𝐨 𝙤𝙣", 
                username: "@zconchita", 
                foto: "https://i.postimg.cc/ZnTx4Q5c/Captura-de-pantalla-2026-04-08-004755.png",
                archivo: "Zpequeno.html"
            },
            { 
                id: "5231380522", 
                nombre: ".40 glock edición especial 👹", 
                username: "@HBxPP2000", 
                foto: "https://i.postimg.cc/VsSMM2cJ/40GLOCK.jpg",
                archivo: "40glock.html"
            },
            { 
                id: "8477619369", 
                nombre: "Dev ביצוע", 
                username: "@devcrackpy", 
                foto: "https://i.postimg.cc/Rh8NpC5q/DEV.jpg",
                archivo: "dev.html"
            },
            { 
                id: "8768231510", 
                nombre: "MR-/BAN HELL", 
                username: "@mrban01", 
                foto: "https://i.postimg.cc/NFh0RJ1n/mrban.jpg",
                archivo: "mrban.html"
            },
            { 
                id: "7952283528", 
                nombre: "Hector Lopez", 
                username: "@oihechl", 
                foto: "https://i.postimg.cc/XNFqnWW3/hector.jpg",
                archivo: "hector.html"
            }
        ];

        function crearTarjeta(exp) {
            const card = document.createElement('div');
            card.className = 'expediente-card';
            card.innerHTML = `
                <div class="card-image-container">
                    <img src="${exp.foto}" alt="${exp.nombre}" class="card-image">
                    <div class="glitch-overlay"></div>
                </div>
                <div class="card-body">
                    <div class="card-id">${exp.id}</div>
                    <div class="card-name">${exp.nombre}</div>
                    <div class="card-username">${exp.username}</div>
                    <button class="btn-ver" onclick="verExpediente('${exp.archivo}')">VER EXPEDIENTE</button>
                </div>
            `;
            return card;
        }

        function renderExpedientes(filtered) {
            const grid = document.getElementById('expedientesGrid');
            grid.innerHTML = '';
            filtered.forEach(exp => grid.appendChild(crearTarjeta(exp)));
        }

        document.getElementById('searchInput').addEventListener('input', function(e) {
            const term = e.target.value.toLowerCase();
            const filtered = expedientes.filter(exp =>
                exp.id.toLowerCase().includes(term) ||
                exp.nombre.toLowerCase().includes(term) ||
                exp.username.toLowerCase().includes(term)
            );
            renderExpedientes(filtered);
        });

        window.verExpediente = function(archivo) {
            if (!archivo) return;
            window.location.href = archivo;
        };

        renderExpedientes(expedientes);

        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let mouse = { x: null, y: null, radius: 280 };

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        class Node {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.vx = (Math.random() - 0.5) * 2.6;
                this.vy = (Math.random() - 0.5) * 2.6;
                this.radius = Math.random() * 2.8 + 1.4;
            }
            update() {
                if (mouse.x !== null) {
                    let dx = this.x - mouse.x;
                    let dy = this.y - mouse.y;
                    let dist = Math.hypot(dx, dy);
                    if (dist < mouse.radius && dist > 0) {
                        let force = (mouse.radius - dist) / mouse.radius;
                        this.x += (dx / dist) * force * 7;
                        this.y += (dy / dist) * force * 7;
                    }
                }
                this.x += this.vx;
                this.y += this.vy;
                if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
                if (this.y < 0 || this.y > canvas.height) this.vy *= -1;
            }
            draw() {
                ctx.save();
                ctx.shadowBlur = 15;
                ctx.shadowColor = '#ff003c';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = '#ff003c';
                ctx.fill();
                ctx.restore();
            }
        }

        function initParticles() {
            particles = [];
            const count = Math.floor((canvas.width * canvas.height) / 5200);
            for (let i = 0; i < count; i++) particles.push(new Node());
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particles.length; i++) {
                const p = particles[i];
                p.update();
                p.draw();
                for (let j = i + 1; j < particles.length; j++) {
                    const p2 = particles[j];
                    const dx = p.x - p2.x;
                    const dy = p.y - p2.y;
                    const dist = Math.hypot(dx, dy);
                    if (dist < 160) {
                        ctx.beginPath();
                        ctx.strokeStyle = `rgba(255, 0, 60, ${0.95 - dist/160})`;
                        ctx.lineWidth = 1;
                        ctx.moveTo(p.x, p.y);
                        ctx.lineTo(p2.x, p2.y);
                        ctx.stroke();
                    }
                }
            }
            requestAnimationFrame(animate);
        }

        window.addEventListener('mousemove', function(e) {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });
        window.addEventListener('mouseout', function() {
            mouse.x = null;
            mouse.y = null;
        });

        initParticles();
        animate();

        document.getElementById('mobile-menu').addEventListener('click', function() {
            document.getElementById('nav-links').classList.toggle('active');
        });

        document.addEventListener('contextmenu', function(e) { e.preventDefault(); });
        document.addEventListener('keydown', function(e) {
            if (e.key === 'F12' || 
                (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'J' || e.key === 'C')) || 
                (e.ctrlKey && e.key === 'U')) {
                e.preventDefault();
            }
        });
        setInterval(function() {
            (function() { return false; }['constructor']('debugger')());
        }, 60);
    </script>
</body>

        .card-username {

        .card-file {
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;

            background: transparent;

            border-radius: 50px;
            font-weight: 700;
            font-size: 1.1rem;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.4s ease;
            text-transform: uppercase;
        }
        .btn-ver:hover {
            background: var(--neon-red);
            box-shadow: 0 0 35px var(--neon-red);
            transform: scale(1.1);
        }
        @keyframes titleGlow {
            from { text-shadow: 0 0 30px var(--neon-red), 0 0 70px var(--neon-red); }
            to { text-shadow: 0 0 50px var(--neon-red), 0 0 100px var(--neon-red), 0 0 140px var(--neon-red); }
        }
        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-4px, 4px); }
            40% { transform: translate(-4px, -4px); }
            60% { transform: translate(4px, 4px); }
            80% { transform: translate(4px, -4px); }
            100% { transform: translate(0); }
        }
        @media (max-width: 1024px) {
            .nav-links {
                display: none;
                position: absolute;
                top: 100%;
                left: 0;
                width: 100%;
                flex-direction: column;
                background: rgba(3, 0, 0, 0.98);
                padding: 2rem 0;
                text-align: center;
                border-bottom: 1px solid var(--neon-red);
            }
            .nav-links.active { display: flex; }
            .hamburger { display: flex; }
        }
    </style>
</head>
<body>

    </main>

    <script>
        const expedientes = [
            { 
                id: "8551203026", 
                nombre: "🇨🇴Yei777🍀", 
                username: "@yei777moneyyy", 
                foto: "https://i.postimg.cc/FzbtfDFs/photo-2025-11-25-07-01-55.jpg",

            },
            { 
                id: "8353760780",

                archivo: "corleone.html"
            },
            { 
                id: "1609732536", 
                nombre: "Yuranys🐛", 
                username: "@Yuranyss",

            },
            { 
                id: "8491972019",

            },

            },
            { 
                id: "8477619369", 
                nombre: "Dev ביצוע", 
                username: "@devcrackpy", 
                foto: "https://i.postimg.cc/Rh8NpC5q/DEV.jpg",
                archivo: "dev.html"
            },
            { 
                id: "8768231510", 
                nombre: "MR-/BAN HELL", 
                username: "@mrban01", 
                foto: "https://i.postimg.cc/NFh0RJ1n/mrban.jpg",
                archivo: "mrban.html"
            },
            { 
                id: "7952283528", 
                nombre: "Hector Lopez", 
                username: "@oihechl", 
                foto: "https://i.postimg.cc/XNFqnWW3/hector.jpg",
                archivo: "hector.html"
            }
        ];

        function crearTarjeta(exp) {
            const card = document.createElement('div');
            card.className = 'expediente-card';
            card.innerHTML = `
                <div class="card-image-container">
                    <img src="${exp.foto}" alt="${exp.nombre}" class="card-image">
                    <div class="glitch-overlay"></div>
                </div>
                <div class="card-body">
                    <div class="card-id">${exp.id}</div>
                    <div class="card-name">${exp.nombre}</div>
                    <div class="card-username">${exp.username}</div>
                    <div class="card-file">📁 ${exp.archivo}</div>
                    <button class="btn-ver" onclick="verExpediente('${exp.archivo}')">VER EXPEDIENTE</button>
                </div>
            `;
            return card;
        }

        function renderExpedientes(filtered) {
            const grid = document.getElementById('expedientesGrid');
            grid.innerHTML = '';
            filtered.forEach(exp => grid.appendChild(crearTarjeta(exp)));
        }

        document.getElementById('searchInput').addEventListener('input', function(e) {
            const term = e.target.value.toLowerCase();
            const filtered = expedientes.filter(exp =>
                exp.id.toLowerCase().includes(term) ||
                exp.nombre.toLowerCase().includes(term) ||
                exp.username.toLowerCase().includes(term)
            );
            renderExpedientes(filtered);
        });

        window.verExpediente = function(archivo) {
            if (!archivo) return;
            window.location.href = archivo;
        };

        renderExpedientes(expedientes);

        // Canvas Background (mantengo el mismo animado)
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let mouse = { x: null, y: null, radius: 280 };

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        class Node {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.vx = (Math.random() - 0.5) * 2.6;
                this.vy = (Math.random() - 0.5) * 2.6;
                this.radius = Math.random() * 2.8 + 1.4;
            }
            update() {
                if (mouse.x !== null) {
                    let dx = this.x - mouse.x;
                    let dy = this.y - mouse.y;
                    let dist = Math.hypot(dx, dy);
                    if (dist < mouse.radius && dist > 0) {
                        let force = (mouse.radius - dist) / mouse.radius;
                        this.x += (dx / dist) * force * 7;
                        this.y += (dy / dist) * force * 7;
                    }
                }
                this.x += this.vx;
                this.y += this.vy;
                if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
                if (this.y < 0 || this.y > canvas.height) this.vy *= -1;
            }
            draw() {
                ctx.save();
                ctx.shadowBlur = 15;
                ctx.shadowColor = '#ff003c';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = '#ff003c';
                ctx.fill();
                ctx.restore();
            }
        }

        function initParticles() {
            particles = [];
            const count = Math.floor((canvas.width * canvas.height) / 5200);
            for (let i = 0; i < count; i++) particles.push(new Node());
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particles.length; i++) {
                const p = particles[i];
                p.update();
                p.draw();
                for (let j = i + 1; j < particles.length; j++) {
                    const p2 = particles[j];
                    const dx = p.x - p2.x;
                    const dy = p.y - p2.y;
                    const dist = Math.hypot(dx, dy);
                    if (dist < 160) {
                        ctx.beginPath();
                        ctx.strokeStyle = `rgba(255, 0, 60, ${0.95 - dist/160})`;
                        ctx.lineWidth = 1;
                        ctx.moveTo(p.x, p.y);
                        ctx.lineTo(p2.x, p2.y);
                        ctx.stroke();
                    }
                }
            }
            requestAnimationFrame(animate);
        }

        window.addEventListener('mousemove', function(e) {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });
        window.addEventListener('mouseout', function() {
            mouse.x = null;
            mouse.y = null;
        });

        initParticles();
        animate();

        document.getElementById('mobile-menu').addEventListener('click', function() {
            document.getElementById('nav-links').classList.toggle('active');
        });

        document.addEventListener('contextmenu', function(e) { e.preventDefault(); });
        document.addEventListener('keydown', function(e) {
            if (e.key === 'F12' || 
                (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'J' || e.key === 'C')) || 
                (e.ctrlKey && e.key === 'U')) {
                e.preventDefault();
            }
        });
        setInterval(function() {
            (function() { return false; }['constructor']('debugger')());
        }, 60);
    </script>
