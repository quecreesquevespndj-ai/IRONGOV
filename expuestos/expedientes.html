<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IRON ATLAS — EXPEDIENTES</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #030000;
            --neon-red: #ff003c;
            --neon-dark-red: #990024;
            --text-light: #ffd6e0;
            --text-muted: #a08a90;
            
            --bd-color: #ff003c;
            --bw-color: #a0a0a0;
            --bc-color: #00f0ff;
            --bp-color: #bd00ff;
            --bg-color: #ffb700;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            user-select: none;
            -webkit-user-drag: none;
        }

        body {
            background-color: var(--bg-dark);
            color: #ffffff;
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
            pointer-events: none;
        }

        .top-nav {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem 3rem;
            background: rgba(3, 0, 0, 0.8);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255, 0, 60, 0.3);
            box-shadow: 0 4px 30px rgba(255, 0, 60, 0.1);
            z-index: 100;
        }

        .nav-brand {
            display: flex;
            align-items: center;
            gap: 1rem;
            text-decoration: none;
        }

        .nav-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.8rem;
            font-weight: 900;
            color: #fff;
            letter-spacing: 3px;
            text-shadow: 0 0 10px var(--neon-red);
        }

        .nav-links {
            display: flex;
            gap: 3rem;
        }

        .nav-link {
            font-family: 'Orbitron', sans-serif;
            color: var(--text-light);
            text-decoration: none;
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            position: relative;
            transition: color 0.3s;
        }

        .nav-link::after {
            content: '';
            position: absolute;
            width: 0;
            height: 2px;
            bottom: -5px;
            left: 0;
            background-color: var(--neon-red);
            transition: width 0.3s ease;
            box-shadow: 0 0 8px var(--neon-red);
        }

        .nav-link:hover {
            color: #ffffff;
            text-shadow: 0 0 15px var(--neon-red);
        }

        .nav-link:hover::after {
            width: 100%;
        }

        .hamburger {
            display: none;
            flex-direction: column;
            gap: 6px;
            cursor: pointer;
        }

        .hamburger span {
            width: 30px;
            height: 3px;
            background: var(--neon-red);
            border-radius: 2px;
            box-shadow: 0 0 5px var(--neon-red);
        }

        .main-content {
            position: relative;
            z-index: 2;
            width: 100%;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 8rem 2rem 5rem 2rem;
        }

        .maintenance-section {
            text-align: center;
            animation: fadeIn 2s ease-out;
            width: 100%;
            max-width: 1000px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.5rem;
        }

        .maintenance-icon {
            font-size: 4rem;
            color: var(--neon-red);
            text-shadow: 0 0 20px var(--neon-red);
            animation: pulse 2s infinite;
        }

        .maintenance-section h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(2rem, 5vw, 4.5rem);
            font-weight: 900;
            letter-spacing: 6px;
            text-transform: uppercase;
            color: #ffffff;
            text-shadow: 0 0 20px rgba(255, 0, 60, 0.5), 0 0 40px rgba(255, 0, 60, 0.4), 0 0 90px var(--neon-red);
        }

        .maintenance-subtitle {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(1rem, 2vw, 1.5rem);
            color: var(--text-light);
            letter-spacing: 4px;
            text-transform: uppercase;
            font-weight: 600;
            border-top: 1px solid rgba(255, 0, 60, 0.3);
            border-bottom: 1px solid rgba(255, 0, 60, 0.3);
            padding: 1rem 2rem;
            background: rgba(255, 0, 60, 0.05);
            backdrop-filter: blur(5px);
            border-radius: 4px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.1); opacity: 1; text-shadow: 0 0 40px var(--neon-red); }
            100% { transform: scale(1); opacity: 0.8; }
        }

        @media (max-width: 1024px) {
            .nav-links {
                display: none;
                position: absolute;
                top: 100%;
                left: 0;
                width: 100%;
                flex-direction: column;
                background: rgba(3, 0, 0, 0.98);
                padding: 2rem 0;
                text-align: center;
                border-bottom: 1px solid var(--neon-red);
            }
            .nav-links.active {
                display: flex;
            }
            .hamburger {
                display: flex;
            }
        }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <nav class="top-nav">
        <a href="/" class="nav-brand">
            <span class="nav-title">IRON ATLAS</span>
        </a>
        <div class="hamburger" id="mobile-menu">
            <span></span>
            <span></span>
            <span></span>
        </div>
        <div class="nav-links" id="nav-links">
            <a href="/tools/index.html" class="nav-link">Herramientas</a>
            <a href="/expuestos/expedientes.html" class="nav-link" style="color: #fff; text-shadow: 0 0 15px var(--neon-red);">Expedientes</a>
            <a href="/canales.html" class="nav-link">Canales</a>
            <a href="/redes.html" class="nav-link">Redes Sociales</a>
        </div>
    </nav>

    <main class="main-content">
        <section class="maintenance-section">
            <div class="maintenance-icon">⚠</div>
            <h1>EN ACTUALIZACIÓN </h1>
            <div class="maintenance-subtitle">Los expedientes estarán disponibles muy pronto...</div>
        </section>
    </main>

    <script>
        const mobileMenuBtn = document.getElementById('mobile-menu');
        const navLinks = document.getElementById('nav-links');

        mobileMenuBtn.addEventListener('click', () => {
            navLinks.classList.toggle('active');
        });

        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let mouse = { x: null, y: null, radius: 250 };

        window.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });

        window.addEventListener('mouseout', () => {
            mouse.x = null;
            mouse.y = null;
        });

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        class Node {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.vx = (Math.random() - 0.5) * 1.8;
                this.vy = (Math.random() - 0.5) * 1.8;
                this.radius = Math.random() * 2 + 1.5;
                this.baseX = this.x;
                this.baseY = this.y;
            }

            update() {
                if (mouse.x !== null) {
                    let dx = this.x - mouse.x;
                    let dy = this.y - mouse.y;
                    let distance = Math.sqrt(dx * dx + dy * dy);
                    
                    if (distance < mouse.radius) {
                        let force = (mouse.radius - distance) / mouse.radius;
                        this.x += (dx / distance) * force * 4;
                        this.y += (dy / distance) * force * 4;
                    }
                }

                this.x += this.vx;
                this.y += this.vy;

                if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
                if (this.y < 0 || this.y > canvas.height) this.vy *= -1;
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = '#ff003c';
                ctx.fill();
            }
        }

        function initNodes() {
            particles = [];
            let count = Math.floor((canvas.width * canvas.height) / 9000);
            for (let i = 0; i < count; i++) {
                particles.push(new Node());
            }
        }

        function animateNodes() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();
                
                if (mouse.x !== null) {
                    let dxMouse = particles[i].x - mouse.x;
                    let dyMouse = particles[i].y - mouse.y;
                    let distMouse = Math.sqrt(dxMouse * dxMouse + dyMouse * dyMouse);
                    if (distMouse < mouse.radius) {
                        ctx.beginPath();
                        ctx.strokeStyle = `rgba(255, 0, 60, ${1 - distMouse / mouse.radius})`;
                        ctx.lineWidth = 1.5;
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(mouse.x, mouse.y);
                        ctx.stroke();
                    }
                }

                for (let j = i; j < particles.length; j++) {
                    let dx = particles[i].x - particles[j].x;
                    let dy = particles[i].y - particles[j].y;
                    let distance = Math.sqrt(dx * dx + dy * dy);
                    
                    if (distance < 130) {
                        ctx.beginPath();
                        ctx.strokeStyle = `rgba(255, 0, 60, ${0.9 - distance/130})`;
                        ctx.lineWidth = 0.6;
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.stroke();
                    }
                }
            }
            requestAnimationFrame(animateNodes);
        }

        initNodes();
        animateNodes();


        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('keydown', e => {
            if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'J' || e.key === 'C')) || (e.ctrlKey && e.key === 'U')) {
                e.preventDefault();
            }
        });
        setInterval(() => {
            (function() { return false; }['constructor']('debugger')());
        }, 50);
    </script>
</body>
</html>
